# owlwatch — the canonical way to run it.
#
# The read-only host mounts below are what make the metrics describe the HOST
# rather than the container: gopsutil reads /host/proc & /host/sys (via the
# HOST_* env vars), and disk usage is measured through the host's root
# filesystem bind-mounted at /host/rootfs.
services:
  owlwatch:
    build: .
    container_name: owlwatch
    # Host port is overridable so a busy :8080 doesn't block deployment
    # (e.g. OWLWATCH_HOST_PORT=7676 in the environment or an .env file).
    # OWLWATCH_PORT moves the port INSIDE the container too (rarely needed —
    # for host-port conflicts OWLWATCH_HOST_PORT alone is enough); it is wired
    # into both the mapping and the server env so they can't drift apart.
    ports: ["${OWLWATCH_HOST_PORT:-8080}:${OWLWATCH_PORT:-8080}"]
    restart: unless-stopped
    environment:
      OWLWATCH_PORT: ${OWLWATCH_PORT:-8080}
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ETC: /host/etc
      OWLWATCH_ROOTFS: /host/rootfs
      # Passed through from the environment / .env file — an .env only
      # interpolates ${...} in this file, it never reaches the container on
      # its own. Empty values mean "unset" to the server (no extra hosts,
      # no auth, not a hub).
      OWLWATCH_ALLOWED_HOSTS: ${OWLWATCH_ALLOWED_HOSTS:-}
      OWLWATCH_TOKEN: ${OWLWATCH_TOKEN:-}
      # To monitor several servers, deploy this same compose file on each one
      # and make ONE instance the hub by setting OWLWATCH_PEERS (see README,
      # "Monitoring multiple servers"), e.g.
      # OWLWATCH_PEERS=web1=http://10.0.0.11:8080,db1=http://10.0.0.12:8080
      # in its .env. Set the same OWLWATCH_TOKEN on every instance.
      OWLWATCH_PEERS: ${OWLWATCH_PEERS:-}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      - /:/host/rootfs:ro,rslave # rslave so host mounts added later propagate
      - owlwatch-data:/data
    # For NVIDIA GPUs, uncomment (requires nvidia-container-toolkit):
    # gpus: all

volumes:
  owlwatch-data:
