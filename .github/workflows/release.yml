name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build and test web UI
        working-directory: web
        run: npm ci && npm run build && npm test && npm audit --audit-level=high
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: Verify Go source
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./... -race
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  binaries:
    name: Binary ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: npm ci && npm run build
        working-directory: web

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          base="owlwatch_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${base}"
          go build -trimpath -ldflags "-s -w -X main.version=${version}" \
            -o "dist/${base}/owlwatch" ./cmd/owlwatch
          cp README.md LICENSE CHANGELOG.md "dist/${base}/"
          tar -C dist -czf "dist/${base}.tar.gz" "${base}"
          rm -rf "dist/${base}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: owlwatch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: owlwatch-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: (cd dist && sha256sum * > checksums.txt)

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/*

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "owlwatch $GITHUB_REF_NAME"
